<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Company | Contact</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #1e3a8a;
            padding: 15px 0;
        }
        nav {
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
        }
        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
        }
        h1 {
            color: #1e3a8a;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background: #1e3a8a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #153075;
        }
        footer {
            background: #1e3a8a;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="container">
    <h1>Contact Us</h1>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Email Address</label>
        <input type="email" placeholder="Enter your email">

        <label>Message</label>
        <textarea rows="5" placeholder="Write your message"></textarea>

        <button type="submit">Send Message</button>
    </form>

    <h3>Contact Information</h3>
    <p>Email: info@mycompany.com</p>
    <p>Phone: +91 9876543210</p>
    <p>Location: Pune, Maharashtra, India</p>
</div>

<footer>
    <p>&copy; 2026 My Company. All Rights Reserved.</p>
</footer>

</body>
</html>
